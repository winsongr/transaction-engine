services:
  postgres:
    image: postgres:18.1
    container_name: transaction_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 4SFg5BhV50gg
      POSTGRES_DB: transaction_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:v25.3.4
    container_name: transaction_redpanda
    restart: always
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr
      - INTERNAL://redpanda:9092,EXTERNAL://localhost:19092
    ports:
      - "19092:19092"
      - "9092:9092"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.4.0
    container_name: transaction_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redpanda-console:
    image: redpandadata/console:v2.8.0
    container_name: transaction_redpanda_console
    restart: always
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy

  # --- Application ---
  migrate:
    build: .
    container_name: transaction_migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:4SFg5BhV50gg@postgres:5432/transaction_engine
    command: alembic upgrade head

  api:
    build: .
    container_name: transaction_api
    depends_on:
      migrate:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:4SFg5BhV50gg@postgres:5432/transaction_engine
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    container_name: transaction_worker
    depends_on:
      migrate:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:4SFg5BhV50gg@postgres:5432/transaction_engine
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
    command: python -m src.cmd.outbox_publisher

volumes:
  postgres_data:
  redpanda_data:
  redis_data:
